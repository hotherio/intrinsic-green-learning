name: Pull Request Validation

on:
  push:
    branches:
    - renovate/**
  pull_request:
    branches:
    - main
    - develop
  pull_request_target:  # For PR title validation
    types:
    - opened
    - edited
    - synchronize

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Letter-start, no trailing period. Lowercase is accepted so
          # Renovate-style subjects ("update foo to v3.14") pass alongside
          # capitalised ones; we still reject digit/punct-prefixed subjects
          # and the trailing-period antipattern.
          subjectPattern: ^[A-Za-z].+[^.]$
          validateSingleCommit: true       # also check lone commit if PR has only one

  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Free-threaded 3.14t runs as part of the matrix but is allowed to
        # fail (see `include` below) — gives early signal on GIL-free
        # compatibility without gating PRs.
        python-version: ["3.13", "3.14"]
        experimental: [false]
        include:
          - python-version: "3.14t"
            experimental: true
      fail-fast: false

    continue-on-error: ${{ matrix.experimental }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Setup Python and uv
      uses: ./.github/actions/setup-python-uv
      with:
        python-version: ${{ matrix.python-version }}
        dependency-groups: all

    - name: Install lefthook
      run: |
        source .venv/bin/activate
        lefthook install

    - name: Lint
      run: |
        source .venv/bin/activate
        lefthook run pre-commit --all-files

    - name: Tests
      run: uv run -m pytest || exit 0

  typecheck-ty:
    # Parallel non-blocking signal from Astral's ty checker (beta, ~90% spec
    # conformance as of early 2026). basedpyright is authoritative; ty results
    # surface issues early without gating PRs. Promote to blocking once ty 1.0
    # ships and pydantic/attrs support is complete.
    name: Type Check (ty, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      # `--with-editable ".[all]"` installs the project plus every optional
      # extra (matplotlib, mne, transformers, kneed, …) into ty's ephemeral
      # env so it can resolve guarded imports like `matplotlib.axes` inside
      # `igl.viz`. `--python 3.13` pins the interpreter — without it, uvx
      # falls back to the runner's default 3.12 and dependency resolution
      # fails because the project requires Python >= 3.13.
      - run: uvx --python 3.13 --with-editable ".[all]" ty check src/

  validate-docs:
    name: Validate Docs
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Setup Python and uv
      uses: ./.github/actions/setup-python-uv
      with:
        dependency-groups: doc

    - name: Build docs
      run: |
        source .venv/bin/activate
        # `hatch version dev` requires dynamic versioning; this project uses
        # static `project.version` (managed by python-semantic-release), so
        # we build docs with the current static version.
        mkdocs build
