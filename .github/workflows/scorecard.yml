name: OpenSSF Scorecard

# GitHub-only: Scorecard is GitHub Actions-only (and the public scorecard.dev
# UI only ingests GitHub repos). On Forgejo this workflow does nothing.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"  # weekly Mondays 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to scorecard.dev
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://scorecard.dev so the badge in README
          # auto-updates after each successful run.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif
          category: scorecard
