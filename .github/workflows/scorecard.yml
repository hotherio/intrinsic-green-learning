name: OpenSSF Scorecard

# GitHub-only: Scorecard is GitHub Actions-only (and the public scorecard.dev
# UI only ingests GitHub repos). On Forgejo this workflow does nothing.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"  # weekly Mondays 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.server_url == 'https://github.com'
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to scorecard.dev
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://scorecard.dev so the badge in README
          # auto-updates after each successful run.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: results.sarif
          category: scorecard
