name: Security

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
  schedule:
    # Weekly Monday 06:00 UTC — catches new CVEs against unchanged deps
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (uv.lock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Export requirements from uv.lock
        run: uv export --frozen --no-emit-project --output-file requirements.txt

      - name: Run pip-audit
        # Scoped, deliberate suppressions tracked in issue #52; new advisories
        # still fail the job. Both trace back to torch 2.12.0 and go away with
        # the next torch release that addresses them:
        #   - CVE-2025-3000: torch advisory with no released fix version
        #     (pip-audit reports an empty "Fix Versions" column).
        #   - PYSEC-2026-3447: fixed in setuptools 83.0.0, but torch pins
        #     setuptools<82, so the fix is unreachable until torch relaxes it.
        run: >-
          uvx pip-audit --requirement requirements.txt --strict --disable-pip
          --ignore-vuln CVE-2025-3000
          --ignore-vuln PYSEC-2026-3447

  zizmor:
    # Non-blocking. Block 6 cleared SHA-pinning, concurrency, and per-job
    # permissions, dropping findings from 70 to ~7. The remaining ones
    # are accepted architecture tradeoffs:
    #   - `dangerous-triggers` on pull_request_target: required for PR
    #     title validation (action runs on PR metadata only, not on
    #     checked-out PR code).
    #   - `artipacked` on checkouts that push commits/tags (semantic-
    #     release, docs publishing): these legitimately need credentials.
    # SARIF still uploads to Code Scanning so reviewers can see findings.
    name: zizmor (workflow audit, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write  # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run zizmor
        # GH_TOKEN allows zizmor to fetch action metadata (rate-limit avoidance)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor --format sarif .github/workflows/ > zizmor.sarif || true

      - name: Upload zizmor SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor
